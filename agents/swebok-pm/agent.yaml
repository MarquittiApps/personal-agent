spec_version: "0.1.0"
name: swebok-pm
version: 1.0.0
description: Requirements Analyst and Product Manager specializing in SWEBOK v4 KA01 and ISO 29148.
author: gitagent-swebok
license: proprietary
model:
  preferred: claude-opus-4-6
