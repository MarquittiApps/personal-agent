spec_version: "0.1.0"
name: qa-auditor
version: 1.0.0
description: Quality assurance ensuring SWEBOK compliance, test correctness, and security.
author: gitagent-swebok
license: proprietary
model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5-20250929
  constraints:
    temperature: 0.1
    max_tokens: 8192
dependencies:
  - name: fullstack-developer
    source: ../fullstack-developer
    version: 1.0.0
    mount: agents/fullstack-developer
skills:
  - testing-qa
  - e2e-testing
  - security-audit
  - find-bugs
tools:
  - run-tests
  - evaluate-coverage
agents: {}
delegation:
  mode: manual
runtime:
  max_turns: 40
  temperature: 0.1
  timeout: 300
compliance:
  risk_tier: high
  frameworks:
    - swebok-v4
    - owasp
  supervision:
    designated_supervisor: user
    review_cadence: pre-release
    human_in_the_loop: required_for_release
  recordkeeping:
    audit_logging: true
    retention_period: 3y
segregation_of_duties:
  roles:
    - id: quality-auditor
      description: Reviews logic, runs suites, checks for vulnerabilities.
      permissions: [read, test, report]
tags:
  - qa
  - testing
  - security
metadata:
  cost_center: CC-SWEBOK
